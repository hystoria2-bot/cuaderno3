name: Compilar APK Android

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'www/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'
      - '.github/workflows/build-android.yml'

permissions:
  contents: read

jobs:
  apk-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma Android 36
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Comprobar registro npm
        run: |
          npm config get registry
          node --version
          npm --version

      - name: Instalar dependencias
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Compilar APK de prueba
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: cuaderno-gh-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
